name: WPS 自动邀请

on:
  # 每天北京时间 8:00 执行（UTC 0:00）
  schedule:
    - cron: '0 0 * * *'
  # 支持手动触发
  workflow_dispatch:

jobs:
  signin:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 执行邀请脚本
        env:
          WPS_SID: ${{ secrets.WPS_SID }}
          WPS_INVITE_USERID: ${{ secrets.WPS_INVITE_USERID }}
          WPS_INVITE_SIDS: ${{ secrets.WPS_INVITE_SIDS }}
          ENABLE_CLOCK_IN: ${{ secrets.ENABLE_CLOCK_IN }}
          ENABLE_DOCER_CHECKIN: ${{ secrets.ENABLE_DOCER_CHECKIN }}
          SERVER_CHAN_KEY: ${{ secrets.SERVER_CHAN_KEY }}
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: python3 wps_auto_signin.py
